syntax = "proto3";

package wiki.v1;

option go_package = "github.com/gobenpark/colign/gen/proto/wiki/v1;wikiv1";

import "google/protobuf/timestamp.proto";

message WikiPage {
  string id = 1;
  int64 project_id = 2;
  string parent_id = 3;
  string title = 4;
  string icon = 5;
  int32 sort_order = 6;
  string content_json = 7;
  string content_text = 8;
  int64 created_by = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  repeated WikiPage children = 12;
  string creator_name = 13;
}

// Pages

message CreateWikiPageRequest {
  int64 project_id = 1;
  string parent_id = 2;
  string title = 3;
}

message CreateWikiPageResponse {
  WikiPage page = 1;
}

message GetWikiPageRequest {
  int64 project_id = 1;
  string page_id = 2;
}

message GetWikiPageResponse {
  WikiPage page = 1;
}

message ListWikiPagesRequest {
  int64 project_id = 1;
}

message ListWikiPagesResponse {
  repeated WikiPage pages = 1;
}

message UpdateWikiPageRequest {
  int64 project_id = 1;
  string page_id = 2;
  string title = 3;
  string icon = 4;
  string content_json = 5;
  string content_text = 6;
}

message UpdateWikiPageResponse {
  WikiPage page = 1;
}

message DeleteWikiPageRequest {
  int64 project_id = 1;
  string page_id = 2;
}

message DeleteWikiPageResponse {}

message RestoreWikiPageRequest {
  int64 project_id = 1;
  string page_id = 2;
}

message RestoreWikiPageResponse {
  WikiPage page = 1;
}

message ReorderWikiPagesRequest {
  int64 project_id = 1;
  string page_id = 2;
  string parent_id = 3;
  int32 sort_order = 4;
}

message ReorderWikiPagesResponse {}

// Images

message UploadWikiImageRequest {
  int64 project_id = 1;
  string page_id = 2;
  string filename = 3;
  string content_type = 4;
  bytes data = 5;
}

message UploadWikiImageResponse {
  int64 id = 1;
  string url = 2;
}

message GetWikiImageRequest {
  int64 id = 1;
}

message GetWikiImageResponse {
  bytes data = 1;
  string content_type = 2;
  string filename = 3;
}

service WikiService {
  rpc CreateWikiPage(CreateWikiPageRequest) returns (CreateWikiPageResponse) {}
  rpc GetWikiPage(GetWikiPageRequest) returns (GetWikiPageResponse) {}
  rpc ListWikiPages(ListWikiPagesRequest) returns (ListWikiPagesResponse) {}
  rpc UpdateWikiPage(UpdateWikiPageRequest) returns (UpdateWikiPageResponse) {}
  rpc DeleteWikiPage(DeleteWikiPageRequest) returns (DeleteWikiPageResponse) {}
  rpc RestoreWikiPage(RestoreWikiPageRequest) returns (RestoreWikiPageResponse) {}
  rpc ReorderWikiPages(ReorderWikiPagesRequest) returns (ReorderWikiPagesResponse) {}
  rpc UploadWikiImage(UploadWikiImageRequest) returns (UploadWikiImageResponse) {}
  rpc GetWikiImage(GetWikiImageRequest) returns (GetWikiImageResponse) {}
}
