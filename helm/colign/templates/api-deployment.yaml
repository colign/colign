apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels:
    {{- include "colign.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "colign.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "colign.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 15
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command: ["/bin/api", "--skip-migrate"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            {{- if .Values.api.edition }}
            - name: COLIGN_EDITION
              value: {{ .Values.api.edition | quote }}
            {{- end }}
            - name: DATABASE_URL
              value: {{ include "colign.databaseURL" . | quote }}
            - name: REDIS_URL
              value: {{ include "colign.redisURL" . | quote }}
            - name: MIGRATIONS_PATH
              value: "/migrations"
            - name: FRONTEND_URL
              value: {{ .Values.api.frontendURL | default (printf "http://%s-web:3000" .Release.Name) | quote }}
            - name: REDIRECT_BASE_URL
              value: {{ .Values.api.redirectBaseURL | default (printf "http://%s-api:8080" .Release.Name) | quote }}
            {{- if and .Values.hocuspocus.enabled .Values.hocuspocus.apiSecret }}
            - name: HOCUSPOCUS_URL
              value: {{ printf "http://%s-hocuspocus:%v" .Release.Name (.Values.hocuspocus.service.port | default 1234) | quote }}
            - name: HOCUSPOCUS_API_SECRET
              value: {{ .Values.hocuspocus.apiSecret | quote }}
            {{- end }}
            {{- range $key, $value := .Values.api.env }}
            {{- if $value }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 10
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
