apiVersion: v2
name: colign
description: AI-powered spec management platform for team alignment
type: application
version: 0.4.1
appVersion: "latest"

dependencies:
  - name: postgresql
    version: "16.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "20.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
