## Production values for colign.co

imagePullSecrets:
  - name: ghcr-login-secret

api:
  replicaCount: 1
  image:
    repository: ghcr.io/colign/colign
    tag: latest
    pullPolicy: IfNotPresent
  migrate:
    enabled: true

web:
  enabled: false  # TODO: build and enable later

hocuspocus:
  enabled: false  # TODO: build and enable later

postgresql:
  enabled: false

redis:
  enabled: false

externalDatabase:
  host: "192.168.0.58"
  port: 55432
  username: "postgres"
  password: ""  # Set via --set externalDatabase.password=... or use externalDatabase.url with existingSecret
  database: "colign"
  schema: "colign"
  sslmode: "require"
